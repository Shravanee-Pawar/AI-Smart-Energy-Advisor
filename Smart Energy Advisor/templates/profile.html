{% extends "base.html" %}

{% block page_header %}
<i class="fa-solid fa-user text-emerald-500"></i> User Profile
{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto space-y-8">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
        <!-- Sidebar profile summary -->
        <div class="md:col-span-1 bg-white rounded-3xl border border-slate-200/60 p-6 flex flex-col items-center text-center shadow-sm h-fit">
            <div class="w-20 h-20 bg-emerald-500/10 text-emerald-500 text-3xl font-black rounded-full flex items-center justify-center mb-4">
                {{ user.name[0] | upper }}
            </div>
            <h3 class="font-extrabold text-lg text-slate-800 leading-tight">{{ user.name }}</h3>
            <p class="text-xs text-slate-400 mt-1 leading-normal truncate w-full">{{ user.email }}</p>
            <span class="inline-block mt-4 px-3 py-1 bg-emerald-500/10 text-emerald-600 rounded-full text-[10px] font-bold uppercase tracking-wider">
                Active Member
            </span>
            <div class="w-full border-t border-slate-100 my-6"></div>
            <div class="w-full text-left space-y-3">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Member Since</p>
                <p class="text-xs text-slate-600 font-semibold flex items-center gap-2">
                    <i class="fa-solid fa-calendar-days text-slate-400"></i> {{ user.created_at[:10] }}
                </p>
            </div>
        </div>

        <!-- Form settings -->
        <div class="md:col-span-2 space-y-8">
            <!-- Card 1: Edit Profile Details -->
            <div class="bg-white rounded-3xl border border-slate-200/60 p-6 sm:p-8 shadow-sm">
                <h4 class="text-md font-bold text-slate-800 tracking-tight mb-6">Account Information</h4>
                <form action="{{ url_for('main.profile') }}" method="POST" class="space-y-5">
                    <input type="hidden" name="action" value="update_profile">
                    
                    <!-- Name -->
                    <div>
                        <label for="name" class="block text-xs font-bold uppercase text-slate-500 tracking-wider mb-2">Full Name</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                                <i class="fa-solid fa-user"></i>
                            </span>
                            <input type="text" name="name" id="name" required value="{{ user.name }}" class="w-full pl-10 pr-4 py-2.5 rounded-2xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 transition-all text-sm text-slate-700 bg-slate-50/50">
                        </div>
                    </div>
                    
                    <!-- Email -->
                    <div>
                        <label for="email" class="block text-xs font-bold uppercase text-slate-500 tracking-wider mb-2">Email Address</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                                <i class="fa-solid fa-envelope"></i>
                            </span>
                            <input type="email" name="email" id="email" required value="{{ user.email }}" class="w-full pl-10 pr-4 py-2.5 rounded-2xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 transition-all text-sm text-slate-700 bg-slate-50/50">
                        </div>
                    </div>
                    
                    <!-- Save profile button -->
                    <div class="flex justify-end">
                        <button type="submit" class="bg-emerald-500 hover:bg-emerald-600 text-white font-semibold py-2.5 px-6 rounded-2xl transition-all shadow-md shadow-emerald-500/25 text-xs flex items-center gap-1.5 transform hover:-translate-y-0.5">
                            Update Profile <i class="fa-solid fa-circle-check"></i>
                        </button>
                    </div>
                </form>
            </div>

            <!-- Card 2: Update Password -->
            <div class="bg-white rounded-3xl border border-slate-200/60 p-6 sm:p-8 shadow-sm">
                <h4 class="text-md font-bold text-slate-800 tracking-tight mb-6">Change Account Password</h4>
                <form action="{{ url_for('main.profile') }}" method="POST" class="space-y-5" onsubmit="return validateChangePasswordForm()">
                    <input type="hidden" name="action" value="change_password">
                    
                    <!-- Current Password -->
                    <div>
                        <label for="current_password" class="block text-xs font-bold uppercase text-slate-500 tracking-wider mb-2">Current Password</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                                <i class="fa-solid fa-lock"></i>
                            </span>
                            <input type="password" name="current_password" id="current_password" required placeholder="••••••••" class="w-full pl-10 pr-10 py-2.5 rounded-2xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 transition-all text-sm text-slate-700 bg-slate-50/50">
                            <button type="button" onclick="togglePasswordVisibility('current_password', this)" class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-slate-600">
                                <i class="fa-solid fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    
                    <!-- New Password -->
                    <div>
                        <label for="new_password" class="block text-xs font-bold uppercase text-slate-500 tracking-wider mb-2">New Password</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                                <i class="fa-solid fa-key"></i>
                            </span>
                            <input type="password" name="new_password" id="new_password" required placeholder="••••••••" class="w-full pl-10 pr-10 py-2.5 rounded-2xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 transition-all text-sm text-slate-700 bg-slate-50/50">
                            <button type="button" onclick="togglePasswordVisibility('new_password', this)" class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-slate-600">
                                <i class="fa-solid fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    
                    <!-- Confirm Password -->
                    <div>
                        <label for="confirm_password" class="block text-xs font-bold uppercase text-slate-500 tracking-wider mb-2">Confirm New Password</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                                <i class="fa-solid fa-circle-check"></i>
                            </span>
                            <input type="password" name="confirm_password" id="confirm_password" required placeholder="••••••••" class="w-full pl-10 pr-10 py-2.5 rounded-2xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 transition-all text-sm text-slate-700 bg-slate-50/50">
                            <button type="button" onclick="togglePasswordVisibility('confirm_password', this)" class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-slate-600">
                                <i class="fa-solid fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    
                    <!-- Error notice card -->
                    <div id="change-pwd-error-card" class="hidden flex items-center gap-2.5 bg-rose-50 border border-rose-100 text-rose-600 text-xs p-3 rounded-xl">
                        <i class="fa-solid fa-triangle-exclamation"></i>
                        <span id="change-pwd-error-text"></span>
                    </div>

                    <!-- Change password button -->
                    <div class="flex justify-end">
                        <button type="submit" class="bg-emerald-500 hover:bg-emerald-600 text-white font-semibold py-2.5 px-6 rounded-2xl transition-all shadow-md shadow-emerald-500/25 text-xs flex items-center gap-1.5 transform hover:-translate-y-0.5">
                            Update Password <i class="fa-solid fa-key"></i>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
